services:
  postgres:
    image: postgres:latest
    container_name: postgres-compose
    environment:
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-compose
    ports:
      - "5672:5672"
      - "15672:15672"